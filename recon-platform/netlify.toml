# Netlify configuration for KRYZENSYS Recon Platform
# FRONTEND ONLY - No Python, No Mise

[build]
  base = "recon-platform/frontend"
  publish = "."
  command = "echo '✅ Static frontend ready' && exit 0"
  edge_functions = false
  functions = false

[build.environment]
  NODE_VERSION = "20.11.0"
  NPM_FLAGS = "--version"
  PYTHON_VERSION = ""
  MISE_PYTHON_COMPILE = "false"
  MISE_PYTHON_PRECOMPILED = "true"
  SKIP_PYTHON_INSTALL = "true"
  DISABLE_MISE_PYTHON = "true"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# PWA service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# Long cache for static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy to backend
[[redirects]]
  from = "/api/*"
  to = "https://recon-api.kryzensys.com/api/:splat"
  status = 200
  force = true

# WebSocket proxy
[[redirects]]
  from = "/ws/*"
  to = "wss://recon-api.kryzensys.com/ws/:splat"
  status = 200
  force = true

[dev]
  framework = "static"
  command = "npx serve . -l 3000"
  targetPort = 3000
  port = 8888
  publish = "."

# Ignore Python/Mise completely
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Skip everything Python-related
[build.processing]
  skip_processing = false
