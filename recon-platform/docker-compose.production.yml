version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on: [api]
    restart: always
    networks: [recon]

  api:
    build: { context: ., dockerfile: Dockerfile.production }
    env_file: [.env]
    environment:
      - DATABASE_URL=postgresql://recon:recon@db:5432/recon
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    expose: ["5000"]
    restart: always
    networks: [recon]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: { context: ., dockerfile: Dockerfile.production }
    command: celery -A modules.celery_app worker --loglevel=info --concurrency=4
    env_file: [.env]
    environment:
      - DATABASE_URL=postgresql://recon:recon@db:5432/recon
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on: [redis, db]
    restart: always
    networks: [recon]

  beat:
    build: { context: ., dockerfile: Dockerfile.production }
    command: celery -A modules.celery_app beat --loglevel=info
    env_file: [.env]
    environment: [CELERY_BROKER_URL=redis://redis:6379/1]
    depends_on: [redis]
    restart: always
    networks: [recon]

  flower:
    build: { context: ., dockerfile: Dockerfile.production }
    command: celery -A modules.celery_app flower --port=5555
    ports: ["5555:5555"]
    environment: [CELERY_BROKER_URL=redis://redis:6379/1]
    depends_on: [redis]
    restart: always
    networks: [recon]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recon
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: recon
    volumes: [postgres_data:/var/lib/postgresql/data]
    expose: ["5432"]
    restart: always
    networks: [recon]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: [redis_data:/data]
    expose: ["6379"]
    restart: always
    networks: [recon]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    volumes: [./prometheus.yml:/etc/prometheus/prometheus.yml:ro]
    ports: ["9090:9090"]
    restart: always
    networks: [recon]

  grafana:
    image: grafana/grafana:latest
    environment: [GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}]
    volumes: [grafana_data:/var/lib/grafana]
    ports: ["3000:3000"]
    restart: always
    networks: [recon]

  node-exporter:
    image: prom/node-exporter:latest
    ports: ["9100:9100"]
    restart: always
    networks: [recon]

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  recon: { driver: bridge }
