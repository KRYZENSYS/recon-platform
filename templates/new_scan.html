{% extends 'base.html' %}
{% block title %}New Scan — Recon Platform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="h3 mb-4"><i class="bi bi-plus-circle"></i> New Scan</h1>

        {% if error %}
        <div class="alert alert-danger"><i class="bi bi-exclamation-triangle"></i> {{ error }}</div>
        {% endif %}

        <div class="card bg-secondary-subtle border-secondary">
            <div class="card-body">
                <form method="POST" action="{{ url_for('new_scan') }}">
                    <div class="mb-4">
                        <label for="target" class="form-label">
                            <i class="bi bi-globe"></i> Target URL or Domain
                        </label>
                        <input type="text" class="form-control form-control-lg" id="target" name="target"
                               placeholder="https://example.com" required>
                        <div class="form-text">
                            URL yoki domen kiriting (https bilan yoki siz).
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label"><i class="bi bi-puzzle"></i> Modules</label>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="modules" value="spider" id="m-spider" checked>
                                    <label class="form-check-label" for="m-spider">
                                        <i class="bi bi-diagram-3 text-primary"></i> <strong>Spider</strong>
                                        <small class="d-block text-muted">Saytning barcha havolalarini yig'ish</small>
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="modules" value="dns" id="m-dns" checked>
                                    <label class="form-check-label" for="m-dns">
                                        <i class="bi bi-hdd-network text-success"></i> <strong>DNS Recon</strong>
                                        <small class="d-block text-muted">DNS yozuvlari va subdomainlar</small>
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="modules" value="user_enum" id="m-user">
                                    <label class="form-check-label" for="m-user">
                                        <i class="bi bi-person-badge text-warning"></i> <strong>User Enum</strong>
                                        <small class="d-block text-muted">Foydalanuvchini platformalarda qidirish</small>
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="modules" value="tech_detect" id="m-tech" checked>
                                    <label class="form-check-label" for="m-tech">
                                        <i class="bi bi-cpu text-info"></i> <strong>Tech Detection</strong>
                                        <small class="d-block text-muted">Ishlatilayotgan texnologiyalar</small>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="alert alert-warning small">
                        <i class="bi bi-shield-exclamation"></i>
                        Faqat <strong>o'zingizga tegishli yoki ruxsat berilgan</strong> resurslarda ishlating!
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-play-fill"></i> Start Scan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
